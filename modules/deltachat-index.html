<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{DOMAIN}}</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background-color: white;
                background-image:
                    repeating-linear-gradient(
                        90deg,
                        #d69fb3 0px,
                        #d69fb3 60px,
                        white 60px,
                        white 120px
                    ),
                    linear-gradient(#d69fb3 0px, #d69fb3 12px, white 12px);
                background-size:
                    120px 50%,
                    100% 100%;
                background-position: bottom, top;
                background-repeat: repeat-x, no-repeat;
                color: #222;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 2rem 1rem;
            }
            .card {
                background: white;
                border-radius: 16px;
                box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
                max-width: 490px;
                width: 100%;
                padding: 2.5rem 2rem;
                text-align: center;
            }
            h1 {
                font-size: 1.6rem;
                font-weight: 700;
                margin-bottom: 0.5rem;
            }
            .subtitle {
                color: #666;
                font-size: 0.95rem;
                margin-bottom: 2rem;
            }
            .qr {
                display: block;
                margin: 0 auto 2rem;
                width: 220px;
                height: 220px;
                border-radius: 8px;
            }
            .btn {
                display: inline-block;
                background: #2090ea;
                color: white;
                text-decoration: none;
                padding: 0.9rem 2rem;
                border-radius: 10px;
                font-size: 1rem;
                font-weight: 600;
                margin-bottom: 1.5rem;
            }
            .btn:hover {
                background: #1070c0;
            }
            .instructions {
                font-size: 0.85rem;
                color: #888;
                line-height: 1.6;
            }
            .instructions a {
                color: #2090ea;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>{{DOMAIN}}</h1>
            <p class="subtitle">A DeltaChat relay</p>

            <img class="qr" src="{{QR_FILE}}" />

            <p class="instructions">
                Open Settings → Advanced → Relays → Add and scan the QR code.<br /><br />
            </p>
        </div>
    </body>
</html>
